<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Invitación de Cumpleaños</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #ffe4f0 0%, #fff0f6 50%, #ffd6e8 100%);
      font-family: sans-serif;
    }

    .scene {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-top: 0;    /* ← era 20px */
    }

    .envelope-wrap {
      cursor: pointer;
      perspective: 800px;
      transition: opacity 0.4s, transform 0.4s;
    }

    .envelope-wrap.hide {
      opacity: 0;
      transform: scale(0.85);
      pointer-events: none;
    }

    .envelope {
      width: 340px;
      height: 230px;
      position: relative;
    }

    .env-body {
      width: 340px;
      height: 230px;
      background: #f9c6d0;
      border-radius: 6px;
      position: absolute;
      bottom: 0;
      overflow: hidden;
    }

    .env-bottom {
      width: 0; height: 0;
      border-left: 170px solid transparent;
      border-right: 170px solid transparent;
      border-bottom: 150px solid #f4a7ba;
      position: absolute; bottom: 0;
    }

    .env-left {
      width: 0; height: 0;
      border-top: 115px solid transparent;
      border-bottom: 115px solid transparent;
      border-left: 180px solid #f7b8c8;
      position: absolute; bottom: 0;
    }

    .env-right {
      width: 0; height: 0;
      border-top: 115px solid transparent;
      border-bottom: 115px solid transparent;
      border-right: 180px solid #f0a3b8;
      position: absolute; bottom: 0; right: 0;
    }

    .flap {
      width: 340px;
      height: 160px;
      position: absolute;
      top: 0; left: 0;
      transform-origin: top center;
      transform-style: preserve-3d;
      transition: transform 0.6s cubic-bezier(.4,0,.2,1);
      z-index: 10;
    }

    .flap-front {
      width: 0; height: 0;
      border-left: 170px solid transparent;
      border-right: 170px solid transparent;
      border-top: 160px solid #f783a0;
      position: absolute;
    }

    .envelope-wrap.open .flap {
      transform: rotateX(-180deg);
    }

    .card-inner {
      width: 300px;
      height: 190px;
      position: absolute;
      top: 20px; left: 20px;
      z-index: 5;
      border-radius: 10px;
      overflow: hidden;
      transition: transform 0.5s 0.3s cubic-bezier(.4,0,.2,1);
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    }

    .envelope-wrap.open .card-inner {
      transform: translateY(-130px);
    }

    .card-inner img {
      width: 100%; height: 100%;
      object-fit: cover; display: block;
    }

    /* ——— INVITACIÓN FINAL ——— */
   .invitation {
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  display: none;
  opacity: 0;
  transition: opacity 0.6s;
  align-items: flex-start;
  justify-content: center;
  background: linear-gradient(135deg, #ffe4f0 0%, #fff0f6 50%, #ffd6e8 100%);
  padding-top: 10px;
  z-index: 100;
}

    .invitation.show {
  display: flex;
}

.invitation.visible {
  opacity: 1;
}

.invitation img {
  display: block;
  width: auto;
  max-width: 95vw;
  height: 95vh;
  max-height: 95vh;
  object-fit: contain;
  border-radius: 18px;
  box-shadow: 0 12px 50px rgba(0,0,0,0.2);
}

    .hint {
      margin-top: 1.5rem;
      font-size: 16px;
      color: #c06080;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: opacity 0.3s;
      user-select: none;
    }

    .hint.hide { opacity: 0; pointer-events: none; }
    .heart { color: #f783a0; font-size: 20px; }
  </style>
</head>
<body>

  <div class="scene">

    <div class="envelope-wrap" id="env" onclick="abrirSobre()">
      <div class="envelope">
        <div class="env-body">
          <div class="env-bottom"></div>
          <div class="env-left"></div>
          <div class="env-right"></div>
        </div>
        <div class="flap"><div class="flap-front"></div></div>
      </div>
    </div>

    <div class="hint" id="hint">
      <span class="heart">♥</span> Toca acá
    </div>

    <div class="invitation" id="invitation">
      <img src="invitacion.png" alt="Invitación de cumpleaños de Sofi">
    </div>

  </div>

  <script>
    var step = 0;

    function abrirSobre() {
      if (step !== 0) return;
      step = 1;

      document.getElementById('env').classList.add('open');
      document.getElementById('hint').classList.add('hide');

      setTimeout(function() {
        document.getElementById('env').classList.add('hide');
        var inv = document.getElementById('invitation');
        inv.classList.add('show');
        setTimeout(function() { inv.classList.add('visible'); }, 30);

        // scroll suave hacia arriba para ver la imagen completa
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }, 950);
    }
  </script>

</body>
</html>
